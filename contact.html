    <style>
        .contact-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 50px; }
        .contact-info { background: var(--clr-white); padding: 40px; border-radius: 12px; box-shadow: var(--shadow-soft); }
        .contact-info h3 { font-size: 1.5rem; margin-bottom: 20px; color: var(--clr-text-main); }
        .contact-info p { margin-bottom: 15px; display: flex; align-items: center; gap: 10px; }
        .map-container { border-radius: 12px; overflow: hidden; box-shadow: var(--shadow-soft); height: 100%; min-height: 400px; }
        .contact-form { margin-top: 30px; display: flex; flex-direction: column; gap: 15px; }
        .contact-form input, .contact-form textarea { width: 100%; padding: 15px; border: 1px solid #ddd; border-radius: 8px; font-family: inherit; font-size: 1rem; }
        .contact-form input:focus, .contact-form textarea:focus { outline: none; border-color: var(--clr-accent-red); box-shadow: 0 0 5px rgba(200, 75, 49, 0.2); }
        @media(max-width: 768px) { .contact-grid { grid-template-columns: 1fr; } }
    </style>
